<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Cost Calculator | Mikrolab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top left, #1e293b, #0f172a 60%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(12px);
    padding: 45px;
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeInContainer 0.6s ease forwards;
    opacity: 0;
}

@keyframes fadeInContainer {
    to { opacity: 1; }
}

h1 {
    margin-top: 0;
    font-size: 24px;
    margin-bottom: 30px;
    font-weight: 600;
}

label {
    font-size: 13px;
    color: #94a3b8;
    display: block;
    margin-bottom: 6px;
    text-align: left;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 22px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    font-size: 15px;
    transition: all 0.2s ease;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}

.result {
    margin-top: 10px;
    font-size: 20px;
    font-weight: 600;
    color: #93c5fd;
    min-height: 30px;
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s ease;
}

.result.show {
    opacity: 1;
    transform: translateY(0);
}

.sub-result {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.sub-result.show {
    opacity: 1;
}

.spacer {
    height: 30px;
}

.back-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #334155;
    color: #cbd5e1;
}

.back-btn:hover {
    background: #475569;
    transform: translateY(-2px);
}

</style>
</head>

<body>

<div class="container">
    <h1>💸 Split Cost Calculator</h1>

    <label>Total Amount (NOK)</label>
    <input type="number" id="total" placeholder="e.g. 4850" oninput="calculate()">

    <label>Number of People</label>
    <input type="number" id="people" placeholder="e.g. 7" oninput="calculate()">

    <div class="result" id="result"></div>
    <div class="sub-result" id="subResult"></div>

    <div class="spacer"></div>

    <button class="back-btn" onclick="goBack()">← Back to Mikrolab</button>
</div>

<script>
function formatNumber(num) {
    return num.toLocaleString('no-NO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calculate() {
    const total = parseFloat(document.getElementById('total').value);
    const people = parseInt(document.getElementById('people').value);
    const resultEl = document.getElementById('result');
    const subResultEl = document.getElementById('subResult');

    if (!total || !people || people <= 0) {
        resultEl.classList.remove('show');
        subResultEl.classList.remove('show');
        resultEl.innerText = "";
        subResultEl.innerText = "";
        return;
    }

    const perPersonRaw = total / people;
    const perPerson = formatNumber(perPersonRaw);
    const remainder = formatNumber(total - (Math.floor(perPersonRaw * 100) / 100) * people);

    resultEl.innerText = `Each person pays: ${perPerson} NOK`;
    subResultEl.innerText = remainder !== "0,00" ? `Rounding difference: ${remainder} NOK` : "";

    resultEl.classList.add('show');
    if (remainder !== "0,00") subResultEl.classList.add('show');
}

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
