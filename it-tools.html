<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Tools – Mikrolab</title>

<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    border-left: 4px solid #3b82f6;
}

a { color: #94a3b8; }
</style>
</head>

<body>

<div class="container">

<h1>🖥️ IT Support Tools</h1>
<p>Search for common error codes and troubleshooting steps.</p>

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="windows">Windows</option>
<option value="network">Network</option>
<option value="printer">Printer</option>
</select>

<input type="text" id="searchInput" placeholder="Search error code or issue...">
<button onclick="searchErrors()">Search</button>

<div id="results"></div>

<br>
<a href="index.html">← Back to Home</a>

</div>

<script>

let errorDatabase = [];

fetch("errors.json")
  .then(response => response.json())
  .then(data => {
      errorDatabase = data;
  });

function levenshtein(a,b){
const matrix=[];
for(let i=0;i<=b.length;i++){matrix[i]=[i]}
for(let j=0;j<=a.length;j++){matrix[0][j]=j}
for(let i=1;i<=b.length;i++){
for(let j=1;j<=a.length;j++){
matrix[i][j]=b[i-1]==a[j-1]
?matrix[i-1][j-1]
:Math.min(matrix[i-1][j-1]+1,matrix[i][j-1]+1,matrix[i-1][j]+1);
}}
return matrix[b.length][a.length];
}

function searchErrors(){
const input=document.getElementById("searchInput").value.toLowerCase();
const category=document.getElementById("categoryFilter").value;
const results=document.getElementById("results");
results.innerHTML="";

if(!input){
results.innerHTML="<div class='card'>Please enter a search term.</div>";
return;
}

const matches=errorDatabase.filter(e=>{
const categoryMatch=category==="all"||e.category===category;
const keywordMatch=e.keywords.some(k=>{
return input.includes(k)||levenshtein(input,k)<3;
});
return categoryMatch&&keywordMatch;
});

if(matches.length===0){
results.innerHTML="<div class='card'>No results found.</div>";
return;
}

matches.forEach(e=>{
results.innerHTML+=`
<div class="card">
<strong>${e.title}</strong><br><br>
<b>Cause:</b> ${e.cause}<br><br>
<b>Resolution:</b> ${e.fix}
</div>`;
});
}

</script>

</body>
</html>
