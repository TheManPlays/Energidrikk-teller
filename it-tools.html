<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Tools – Mikrolab</title>

<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    border-left: 4px solid #3b82f6;
}

.admin-box {
    background: #111827;
    padding: 15px;
    margin-top: 30px;
    border-radius: 8px;
}

a { color: #94a3b8; }
</style>
</head>

<body>

<div class="container">

<h1>🖥️ IT Support Tools</h1>

<select id="categoryFilter">
<option value="all">Alle kategorier</option>
<option value="windows">Windows</option>
<option value="printer">Printer</option>
<option value="network">Nettverk</option>
</select>

<input type="text" id="searchInput" placeholder="Søk feilkode eller problem...">
<button onclick="searchErrors()">Søk</button>

<div id="results"></div>

<hr style="margin:40px 0;">

<h2>🧠 Troubleshooting Guide</h2>

<select id="flowSelect">
<option value="">Velg problemtype</option>
<option value="internet">Ingen internett</option>
<option value="printer">Printer virker ikke</option>
</select>

<div id="flowOutput"></div>

<hr style="margin:40px 0;">

<button onclick="toggleAdmin()">🔒 Admin-modus</button>

<div id="adminPanel" style="display:none;" class="admin-box">

<h3>Legg til ny feilkode</h3>

<input id="newTitle" placeholder="Tittel">
<input id="newCategory" placeholder="Kategori (windows/printer/network)">
<input id="newKeywords" placeholder="Keywords (komma-separert)">
<textarea id="newCause" placeholder="Årsak"></textarea>
<textarea id="newFix" placeholder="Løsning"></textarea>

<button onclick="addError()">Lagre</button>

</div>

<br>
<a href="index.html">← Tilbake</a>

</div>

<script>

let errorDatabase = JSON.parse(localStorage.getItem("errors")) || [
{
title:"0x80070005 – Access Denied",
category:"windows",
keywords:["0x80070005","access denied"],
cause:"Manglende rettigheter.",
fix:"Kjør som administrator."
},
{
title:"Printer Offline",
category:"printer",
keywords:["printer offline","not responding"],
cause:"Printer mistet tilkobling.",
fix:"Restart printer og sjekk nettverk."
}
];

function saveDB(){
localStorage.setItem("errors",JSON.stringify(errorDatabase));
}

function levenshtein(a,b){
const matrix=[];
for(let i=0;i<=b.length;i++){matrix[i]=[i]}
for(let j=0;j<=a.length;j++){matrix[0][j]=j}
for(let i=1;i<=b.length;i++){
for(let j=1;j<=a.length;j++){
matrix[i][j]=b[i-1]==a[j-1]
?matrix[i-1][j-1]
:Math.min(matrix[i-1][j-1]+1,matrix[i][j-1]+1,matrix[i-1][j]+1);
}}
return matrix[b.length][a.length];
}

function searchErrors(){
const input=document.getElementById("searchInput").value.toLowerCase();
const category=document.getElementById("categoryFilter").value;
const results=document.getElementById("results");
results.innerHTML="";

const matches=errorDatabase.filter(e=>{
const categoryMatch=category==="all"||e.category===category;
const keywordMatch=e.keywords.some(k=>{
return input.includes(k)||levenshtein(input,k)<3;
});
return categoryMatch&&keywordMatch;
});

if(matches.length===0){
results.innerHTML="<div class='card'>Ingen treff.</div>";
return;
}

matches.forEach(e=>{
results.innerHTML+=`
<div class="card">
<strong>${e.title}</strong><br><br>
<b>Årsak:</b> ${e.cause}<br><br>
<b>Løsning:</b> ${e.fix}
</div>`;
});
}

document.getElementById("flowSelect").addEventListener("change",function(){
const val=this.value;
const output=document.getElementById("flowOutput");
if(val==="internet"){
output.innerHTML="<div class='card'>1️⃣ Restart router<br>2️⃣ Kjør ipconfig /renew<br>3️⃣ Test annen enhet</div>";
}
if(val==="printer"){
output.innerHTML="<div class='card'>1️⃣ Restart printer<br>2️⃣ Sjekk default printer<br>3️⃣ Reinstaller driver</div>";
}
});

function toggleAdmin(){
const panel=document.getElementById("adminPanel");
panel.style.display=panel.style.display==="none"?"block":"none";
}

function addError(){
const newEntry={
title:document.getElementById("newTitle").value,
category:document.getElementById("newCategory").value,
keywords:document.getElementById("newKeywords").value.split(","),
cause:document.getElementById("newCause").value,
fix:document.getElementById("newFix").value
};
errorDatabase.push(newEntry);
saveDB();
alert("Lagret!");
}

</script>

</body>
</html>
