<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Analyzer | Mikrolab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top right, #1e293b, #0f172a 60%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 100%;
    max-width: 520px;
    background: rgba(30,41,59,0.85);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 45px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeIn 0.6s ease forwards;
    opacity: 0;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

h1 {
    margin: 0 0 25px 0;
    font-weight: 600;
}

.input-wrapper {
    position: relative;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    font-size: 15px;
    margin-bottom: 20px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}

.toggle-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 13px;
}

.toggle-btn:hover {
    color: #cbd5e1;
}

.meter {
    height: 12px;
    background: #0f172a;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
}

.meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 8px;
    transition: width 0.4s ease, background 0.4s ease;
}

.stats {
    margin-top: 15px;
    font-size: 14px;
    line-height: 1.6;
}

.stat-label {
    color: #94a3b8;
}

.security-level {
    font-weight: 600;
}

.back-btn {
    margin-top: 35px;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    background: #334155;
    color: #cbd5e1;
    transition: 0.2s;
}

.back-btn:hover {
    background: #475569;
    transform: translateY(-2px);
}

</style>
</head>

<body>

<div class="container">
    <h1>🔐 Password Entropy Analyzer</h1>

    <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter password..." oninput="analyze()">
        <button type="button" class="toggle-btn" onclick="togglePassword()" id="toggleBtn">Show</button>
    </div>

    <div class="meter">
        <div class="meter-fill" id="meterFill"></div>
    </div>

    <div class="stats" id="stats"></div>

    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Mikrolab</button>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const btn = document.getElementById('toggleBtn');

    if (input.type === 'password') {
        input.type = 'text';
        btn.innerText = 'Hide';
    } else {
        input.type = 'password';
        btn.innerText = 'Show';
    }
}

function analyze() {
    const pwd = document.getElementById('password').value;
    const meter = document.getElementById('meterFill');
    const stats = document.getElementById('stats');

    if (!pwd) {
        meter.style.width = '0%';
        stats.innerHTML = '';
        return;
    }

    let pool = 0;
    if (/[a-z]/.test(pwd)) pool += 26;
    if (/[A-Z]/.test(pwd)) pool += 26;
    if (/[0-9]/.test(pwd)) pool += 10;
    if (/[^a-zA-Z0-9]/.test(pwd)) pool += 32;

    const length = pwd.length;
    const entropy = length * Math.log2(pool || 1);

    let strengthPercent = Math.min((entropy / 100) * 100, 100);
    meter.style.width = strengthPercent + '%';

    let level = '';
    let color = '';

    if (entropy < 40) {
        level = 'Weak';
        color = '#ef4444';
    } else if (entropy < 60) {
        level = 'Moderate';
        color = '#facc15';
    } else if (entropy < 80) {
        level = 'Strong';
        color = '#22c55e';
    } else {
        level = 'Very Strong';
        color = '#3b82f6';
    }

    meter.style.background = color;

    const guessesPerSecond = 1e10; // Fixed offline GPU assumption
    const combinations = Math.pow(pool, length);
    const seconds = combinations / guessesPerSecond;

    const readableTime = formatTime(seconds);

    stats.innerHTML = `
        <div><span class="stat-label">Entropy:</span> ${entropy.toFixed(2)} bits</div>
        <div><span class="stat-label">Estimated crack time:</span> ${readableTime}</div>
        <div><span class="stat-label">Security level:</span> <span class="security-level" style="color:${color}">${level}</span></div>
    `;
}

function formatTime(seconds) {
    if (!isFinite(seconds)) return 'Extremely long time';
    if (seconds < 60) return seconds.toFixed(2) + ' seconds';
    if (seconds < 3600) return (seconds/60).toFixed(2) + ' minutes';
    if (seconds < 86400) return (seconds/3600).toFixed(2) + ' hours';
    if (seconds < 31536000) return (seconds/86400).toFixed(2) + ' days';
    if (seconds < 31536000*1000) return (seconds/31536000).toFixed(2) + ' years';
    return 'Thousands of years';
}
</script>

</body>
</html>
