<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikk Teller</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1b2a33, #0e1a20 70%);
  color: #f2f2f2;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 34px;
  font-weight: 600;
  color: #00ffc3;
}

.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 30px;
  margin: 30px auto;
  max-width: 650px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.hidden { display:none; }

input {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
}

button {
  padding: 8px 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s ease;
}

.primary { background:#00ffc3; color:#0e1a20; }
.primary:hover { background:#00e0aa; }

.danger { background:#ff4c4c; }
.danger:hover { background:#e03b3b; }

.brand-title {
  margin-top: 15px;
  padding: 12px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  font-weight: 600;
}

.flavor-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  margin: 6px 0;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
}

.progress-wrapper {
  margin-top: 25px;
}

.progress-track {
  background: rgba(255,255,255,0.08);
  border-radius: 50px;
  height: 18px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00ffc3,#00aaff);
  transition: width 0.4s ease;
}

.progress-label {
  margin-top: 8px;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<h1>⚡ Energidrikk Teller ⚡</h1>

<div id="authBox" class="card">
  <h2>Logg inn</h2>
  <input type="email" id="email" placeholder="E-post">
  <input type="password" id="password" placeholder="Passord (minst 6 tegn)">
  <div id="errorMsg" style="color:#ff7070;"></div>
  <button class="primary" onclick="login()">Logg inn</button>
  <p>Har du ikke konto?</p>
  <button onclick="register()">Opprett konto</button>
</div>

<div id="app" class="hidden">
  <div class="card">
    <h2 id="welcomeText"></h2>
    <button class="danger" onclick="logout()">Logg ut</button>

    <div id="brands"></div>

    <div class="progress-wrapper">
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 / 5000</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUpqERB_sfUCetgxWwkynRHBUzKcVdl_8",
  authDomain: "energidrikk-teller.firebaseapp.com",
  projectId: "energidrikk-teller",
  storageBucket: "energidrikk-teller.firebasestorage.app",
  messagingSenderId: "159436464618",
  appId: "1:159436464618:web:0ffaff4f0d9e87ddc25293"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

const drinks = {
  "Monster": [
    "Original","Original Sukkerfri","Lewis Hamilton","Lewis Hamilton Sukkerfri",
    "Lando Norris Sukkerfri","Ultra","Ultra Paradise","Ultra Watermelon",
    "Ultra Gold","Ultra Fiesta","Ultra Rosa","Ultra Black",
    "Ultra Peachy Keen","Ultra Strawberry Dreams","Mango Loco",
    "Pipeline Punch","Monarch","Aussie Lemonade","Bad Apple","Rio Punch"
  ],
  "Red Bull": [
    "Original","Sukkerfri","Yellow Edition Tropisk","Blue Edition Blåbær",
    "Purple Edition Skogsbær","Pink Edition","Lilac Edition Lavender",
    "Peach Edition","Spring Edition"
  ],
  "Burn": [
    "Original","Apple Kiwi","Fruit Punch","White Citrus"
  ],
  "Battery": [
    "Original","Peachberry","Fresh","Blueberry",
    "Whirl","Fresh Exotic Fruits","No Calorie"
  ]
};

let statsRef;
let currentStats = { total:0, byFlavor:{} };

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch {
    errorMsg.innerText = "Feil e-post eller passord.";
  }
};

window.register = async () => {
  if (password.value.length < 6) {
    errorMsg.innerText = "Passord må være minst 6 tegn.";
    return;
  }
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
  } catch {
    errorMsg.innerText = "Registrering feilet.";
  }
};

window.logout = async () => await signOut(auth);

onAuthStateChanged(auth, async (user) => {
  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("app");

  if (user) {
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    welcomeText.innerText = "Innlogget som: " + user.email;
    await loadStats();
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }
});

async function loadStats(){
  const year = new Date().getFullYear();
  statsRef = doc(db,"stats",auth.currentUser.uid+"_"+year);
  const snap = await getDoc(statsRef);

  if (!snap.exists()){
    await setDoc(statsRef,currentStats);
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  function updateProgress(){
  const total = currentStats.total || 0;

  const progressBar = document.getElementById("progressBar");
  const progressLabel = document.getElementById("progressLabel");

  // Fyll baren helt (kun visuell effekt)
  progressBar.style.width = "100%";

  // Vis kun total
  progressLabel.innerText = total + " stk totalt";
}

function renderBrands(){
  const container = document.getElementById("brands");
  container.innerHTML = "";

  Object.keys(drinks).forEach(brand=>{
    const title=document.createElement("div");
    title.className="brand-title";
    title.innerText=brand;

    const flavorContainer=document.createElement("div");
    flavorContainer.className="hidden";

    title.onclick=()=>flavorContainer.classList.toggle("hidden");

    drinks[brand].forEach(flavor=>{
      const key=brand+"_"+flavor;
      const count=currentStats.byFlavor[key]||0;

      const flavorDiv=document.createElement("div");
      flavorDiv.className="flavor-box";

      flavorDiv.innerHTML=`
        <span>${flavor}</span>
        <div>
          <button class="primary" onclick="addDrink('${key}')">+</button>
          <button class="danger" onclick="removeDrink('${key}')">-</button>
          <span id="count_${key}">${count}</span>
        </div>
      `;

      flavorContainer.appendChild(flavorDiv);
    });

    container.appendChild(title);
    container.appendChild(flavorContainer);
  });
}

function updateProgress(){
  const total = currentStats.total || 0;
  const percent=Math.min((total/365)*100,100);
  progressBar.style.width=percent+"%";
  progressLabel.innerText=total+" / 365";
}

window.addDrink=async(key)=>{
  await updateDoc(statsRef,{
    total:increment(1),
    [`byFlavor.${key}`]:increment(1)
  });
  currentStats.total++;
  currentStats.byFlavor[key]=(currentStats.byFlavor[key]||0)+1;
  renderBrands();
  updateProgress();
};

window.removeDrink=async(key)=>{
  if(!currentStats.byFlavor[key]) return;
  await updateDoc(statsRef,{
    total:increment(-1),
    [`byFlavor.${key}`]:increment(-1)
  });
  currentStats.total--;
  currentStats.byFlavor[key]--;
  renderBrands();
  updateProgress();
};
</script>

</body>
</html>
