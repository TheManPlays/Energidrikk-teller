<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikrolab – Små digitale verktøy</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
    margin-top: 0;
}

.tool {
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: black;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.85;
}

.result {
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
}
footer {
    margin-top: 30px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <h1>🧪 Mikrolab</h1>
    <p>Små, enkle digitale verktøy.</p>

    <div class="tool">
        <h2>⏱ Møte-slutt-tid</h2>
        
        <label>Starttid:</label>
        <input type="time" id="startTime">

        <label>Varighet (minutter):</label>
        <input type="number" id="duration" placeholder="f.eks 90">

        <button onclick="calculateEndTime()">Regn ut sluttid</button>

        <div class="result" id="result"></div>
    </div>

    <footer>
        Mikrolab – Et sideprosjekt 🚀
    </footer>
</div>

<script>
function calculateEndTime() {
    const startTime = document.getElementById("startTime").value;
    const duration = parseInt(document.getElementById("duration").value);

    if (!startTime || isNaN(duration)) {
        document.getElementById("result").innerText = "Fyll inn begge feltene.";
        return;
    }

    const [hours, minutes] = startTime.split(":").map(Number);
    const totalMinutes = hours * 60 + minutes + duration;

    const endHours = Math.floor((totalMinutes / 60) % 24);
    const endMinutes = totalMinutes % 60;

    const formattedHours = String(endHours).padStart(2, "0");
    const formattedMinutes = String(endMinutes).padStart(2, "0");

    document.getElementById("result").innerText =
        "Møtet slutter kl. " + formattedHours + ":" + formattedMinutes;
}
</script>

</body>
</html>
