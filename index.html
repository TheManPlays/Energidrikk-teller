<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikkteller</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.hidden {
  display: none;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  width: 250px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#progressBar {
  height: 25px;
  background: #00c853;
  margin-top: 15px;
  line-height: 25px;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGIN BOX -->
<div id="authBox">
  <h2>Logg inn</h2>
  <input type="email" id="email" placeholder="E-post">
  <input type="password" id="password" placeholder="Passord (minst 6 tegn)">
  <div id="errorMsg" style="color:red;"></div>
  <button onclick="login()">Logg inn</button>
  <button onclick="register()">Registrer</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <h2 id="welcomeText"></h2>
  <button onclick="logout()">Logg ut</button>

  <div id="brands"></div>

  <div id="progressBar">0 stk</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc, updateDoc,
  addDoc, deleteDoc, collection, query, where,
  orderBy, limit, getDocs, serverTimestamp, increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 LIM INN DIN FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCUpqERB_sfUCetgxWwkynRHBUzKcVdl_8",
  authDomain: "energidrikk-teller.firebaseapp.com",
  projectId: "energidrikk-teller",
  storageBucket: "energidrikk-teller.firebasestorage.app",
  messagingSenderId: "159436464618",
  appId: "1:159436464618:web:0ffaff4f0d9e87ddc25293",
  measurementId: "G-E2M78BPZ26"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const brands = ["Burn", "Monster", "Battery", "Red Bull"];
const yearlyGoal = 365;

let currentStats = null;
let statsRef = null;

/* ===== AUTH ===== */

document.addEventListener("DOMContentLoaded", () => {

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const errorBox = document.getElementById("errorMsg");

  window.register = async () => {
    errorBox.innerText = "";

    if (passwordInput.value.length < 6) {
      errorBox.innerText = "Passord må være minst 6 tegn.";
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);

      await setDoc(doc(db, "users", cred.user.uid), {
        email: emailInput.value,
        createdAt: serverTimestamp(),
        yearlyGoal: 365
      });

    } catch (error) {
      errorBox.innerText = "Registrering feilet.";
    }
  };

  window.login = async () => {
    errorBox.innerText = "";
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch {
      errorBox.innerText = "Feil e-post eller passord.";
    }
  };

  window.logout = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    const authBox = document.getElementById("authBox");
    const appBox = document.getElementById("app");
    const welcomeText = document.getElementById("welcomeText");

    if (!authBox || !appBox) return;

    if (user) {
      authBox.classList.add("hidden");
      appBox.classList.remove("hidden");
      welcomeText.innerText = "Innlogget som: " + user.email;
      await loadStats();
    } else {
      authBox.classList.remove("hidden");
      appBox.classList.add("hidden");
    }
  });

});

/* ===== LOAD STATS ===== */

async function loadStats() {
  const year = new Date().getFullYear();
  statsRef = doc(db, "stats", auth.currentUser.uid + "_" + year);

  const snap = await getDoc(statsRef);

  if (!snap.exists()) {
    const emptyStats = {
      userId: auth.currentUser.uid,
      year: year,
      total: 0,
      byBrand: { Burn: 0, Monster: 0, Battery: 0, "Red Bull": 0 },
      monthly: {}
    };
    await setDoc(statsRef, emptyStats);
    currentStats = emptyStats;
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}

/* ===== RENDER ===== */

function renderBrands() {
  const container = document.getElementById("brands");
  container.innerHTML = "";

  brands.forEach(brand => {
    const count = currentStats.byBrand?.[brand] || 0;

    const div = document.createElement("div");
    div.innerHTML = `
      <h3>${brand}</h3>
      <p>Antall: <span id="count_${brand}">${count}</span></p>
      <button onclick="addDrink('${brand}')">+1</button>
      <button onclick="removeDrink('${brand}')">-1</button>
      <hr>
    `;
    container.appendChild(div);
  });
}

function updateProgress() {
  const total = currentStats.total || 0;
  const percent = Math.min((total / yearlyGoal) * 100, 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = total + " stk";
}

/* ===== ADD ===== */

window.addDrink = async (brand) => {
  const now = new Date();

  await addDoc(collection(db, "drinks"), {
    userId: auth.currentUser.uid,
    brand,
    createdAt: serverTimestamp(),
    year: now.getFullYear(),
    month: now.getMonth() + 1,
    day: now.getDate()
  });

  await updateDoc(statsRef, {
    total: increment(1),
    [`byBrand.${brand}`]: increment(1)
  });

  currentStats.total++;
  currentStats.byBrand[brand]++;
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};

/* ===== REMOVE ===== */

window.removeDrink = async (brand) => {

  const q = query(
    collection(db, "drinks"),
    where("userId", "==", auth.currentUser.uid),
    where("brand", "==", brand),
    orderBy("createdAt", "desc"),
    limit(1)
  );

  const snap = await getDocs(q);
  if (snap.empty) return;

  const drinkDoc = snap.docs[0];
  await deleteDoc(drinkDoc.ref);

  await updateDoc(statsRef, {
    total: increment(-1),
    [`byBrand.${brand}`]: increment(-1)
  });

  currentStats.total--;
  currentStats.byBrand[brand]--;
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};

</script>

</body>
</html>
