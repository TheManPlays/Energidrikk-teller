<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikkteller</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

h1 { color: #00ff88; }

input {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    width: 80%;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.primary { background: #00c853; color: white; }
.danger { background: #d50000; color: white; }

.brand-box {
    background: #1e1e1e;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.progress-container {
    background: #333;
    border-radius: 20px;
    margin-top: 20px;
    height: 25px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff88, #00c853);
    line-height: 25px;
    font-weight: bold;
    color: black;
}

.hidden { display: none; }
</style>
</head>
<body>

<div class="container">
<h1>Energidrikkteller</h1>

<div id="authBox">
    <h2>Logg inn</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="password" placeholder="Passord">
    <br>
    <button class="primary" onclick="login()">Logg inn</button>
    <button onclick="register()">Registrer</button>
</div>

<div id="app" class="hidden">
    <h2 id="welcomeText"></h2>
    <button class="danger" onclick="logout()">Logg ut</button>

    <div id="brands"></div>

    <h3>Total i år</h3>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0</div>
    </div>
</div>

</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 LIM INN DIN FIREBASE CONFIG HER */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const brands = ["Burn", "Monster", "Battery", "Red Bull"];
const yearlyGoal = 365;
let userData = {};
let userRef = null;

function getYear() {
    return new Date().getFullYear();
}

async function loadUserData(uid) {
    userRef = doc(db, "users", uid);
    const snap = await getDoc(userRef);

    if (snap.exists()) {
        userData = snap.data();
        if (userData.year !== getYear()) {
            userData = { year: getYear(), counts: {} };
        }
    } else {
        userData = { year: getYear(), counts: {} };
    }

    brands.forEach(b => {
        if (!userData.counts[b]) userData.counts[b] = 0;
    });

    await setDoc(userRef, userData);
    renderBrands();
    updateProgress();
}

async function saveData() {
    await updateDoc(userRef, userData);
}

function renderBrands() {
    const container = document.getElementById("brands");
    container.innerHTML = "";

    brands.forEach(brand => {
        const div = document.createElement("div");
        div.className = "brand-box";
        div.innerHTML = `
            <h3>${brand}</h3>
            <p>Antall: <span id="count_${brand}">${userData.counts[brand]}</span></p>
            <button class="primary" onclick="addDrink('${brand}')">+1</button>
            <button class="danger" onclick="removeDrink('${brand}')">-1</button>
        `;
        container.appendChild(div);
    });
}

window.addDrink = async (brand) => {
    userData.counts[brand]++;
    await saveData();
    document.getElementById("count_" + brand).innerText = userData.counts[brand];
    updateProgress();
}

window.removeDrink = async (brand) => {
    if (userData.counts[brand] > 0) {
        userData.counts[brand]--;
        await saveData();
        document.getElementById("count_" + brand).innerText = userData.counts[brand];
        updateProgress();
    }
}

function updateProgress() {
    const total = Object.values(userData.counts).reduce((a,b)=>a+b,0);
    const percent = Math.min((total/yearlyGoal)*100,100);
    const bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";
    bar.innerText = total + " stk";
}

window.register = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
        await createUserWithEmailAndPassword(auth, email, password);
    } catch (e) {
        alert(e.message);
    }
}

window.login = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
        await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
        alert(e.message);
    }
}

window.logout = async () => {
    await signOut(auth);
}

onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById("authBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("welcomeText").innerText = "Innlogget som: " + user.email;
        await loadUserData(user.uid);
    } else {
        document.getElementById("authBox").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
    }
});
</script>

</body>
</html>
