<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  signOut, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc, 
  updateDoc, 
  addDoc, 
  deleteDoc,
  collection, 
  query, 
  where, 
  orderBy, 
  limit, 
  getDocs,
  serverTimestamp,
  increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


/* 🔥 LIM INN DIN FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const brands = ["Burn", "Monster", "Battery", "Red Bull"];
const yearlyGoal = 365;

let currentUser = null;
let currentStats = null;
let statsRef = null;

/* =========================
   AUTH
========================= */

window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const cred = await createUserWithEmailAndPassword(auth, email, password);

  // Opprett brukerprofil
  await setDoc(doc(db, "users", cred.user.uid), {
    email: email,
    createdAt: serverTimestamp(),
    yearlyGoal: 365
  });
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, password);
};

window.logout = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcomeText").innerText = "Innlogget som: " + user.email;
    await loadStats();
  } else {
    document.getElementById("authBox").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});


/* =========================
   LOAD / INIT STATS
========================= */

async function loadStats() {
  const year = new Date().getFullYear();
  statsRef = doc(db, "stats", currentUser.uid + "_" + year);

  const snap = await getDoc(statsRef);

  if (!snap.exists()) {
    // Opprett tom stats
    const emptyStats = {
      userId: currentUser.uid,
      year: year,
      total: 0,
      byBrand: {
        "Burn": 0,
        "Monster": 0,
        "Battery": 0,
        "Red Bull": 0
      },
      monthly: {}
    };

    await setDoc(statsRef, emptyStats);
    currentStats = emptyStats;
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}


/* =========================
   RENDER UI
========================= */

function renderBrands() {
  const container = document.getElementById("brands");
  container.innerHTML = "";

  brands.forEach(brand => {
    const count = currentStats.byBrand?.[brand] || 0;

    const div = document.createElement("div");
    div.className = "brand-box";
    div.innerHTML = `
      <h3>${brand}</h3>
      <p>Antall: <span id="count_${brand}">${count}</span></p>
      <button onclick="addDrink('${brand}')">+1</button>
      <button onclick="removeDrink('${brand}')">-1</button>
    `;
    container.appendChild(div);
  });
}

function updateProgress() {
  const total = currentStats.total || 0;
  const percent = Math.min((total / yearlyGoal) * 100, 100);

  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = total + " stk";
}


/* =========================
   ADD DRINK
========================= */

window.addDrink = async (brand) => {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const day = now.getDate();

  // 1️⃣ Lag drink-event
  await addDoc(collection(db, "drinks"), {
    userId: currentUser.uid,
    brand: brand,
    createdAt: serverTimestamp(),
    year: year,
    month: month,
    day: day
  });

  // 2️⃣ Oppdater stats
  await updateDoc(statsRef, {
    total: increment(1),
    [`byBrand.${brand}`]: increment(1),
    [`monthly.${month}`]: increment(1)
  });

  // 3️⃣ Oppdater lokalt
  currentStats.total++;
  currentStats.byBrand[brand]++;
  currentStats.monthly[month] = (currentStats.monthly[month] || 0) + 1;

  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};


/* =========================
   REMOVE DRINK (sletter siste)
========================= */

window.removeDrink = async (brand) => {

  const q = query(
    collection(db, "drinks"),
    where("userId", "==", currentUser.uid),
    where("brand", "==", brand),
    orderBy("createdAt", "desc"),
    limit(1)
  );

  const snap = await getDocs(q);

  if (snap.empty) return;

  const docToDelete = snap.docs[0];
  const data = docToDelete.data();

  await deleteDoc(doc(db, "drinks", docToDelete.id));

  await updateDoc(statsRef, {
    total: increment(-1),
    [`byBrand.${brand}`]: increment(-1),
    [`monthly.${data.month}`]: increment(-1)
  });

  // Oppdater lokalt
  currentStats.total--;
  currentStats.byBrand[brand]--;
  currentStats.monthly[data.month]--;

  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};

</script>
