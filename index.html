<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc, updateDoc,
  addDoc, deleteDoc, collection, query, where,
  orderBy, limit, getDocs, serverTimestamp, increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 LIM INN DIN FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const brands = ["Burn", "Monster", "Battery", "Red Bull"];
const yearlyGoal = 365;

let currentUser = null;
let currentStats = null;
let statsRef = null;

document.addEventListener("DOMContentLoaded", () => {

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const errorBox = document.getElementById("errorMsg");

  /* ===== REGISTER ===== */

  window.register = async () => {
    errorBox.innerText = "";
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (password.length < 6) {
      errorBox.innerText = "Passord må være minst 6 tegn.";
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);

      await setDoc(doc(db, "users", cred.user.uid), {
        email: email,
        createdAt: serverTimestamp(),
        yearlyGoal: 365
      });

    } catch (error) {
      if (error.code === "auth/email-already-in-use") {
        errorBox.innerText = "Denne e-posten er allerede registrert.";
      } else if (error.code === "auth/invalid-email") {
        errorBox.innerText = "Ugyldig e-postadresse.";
      } else {
        errorBox.innerText = "Noe gikk galt. Prøv igjen.";
      }
    }
  };

  /* ===== LOGIN ===== */

  window.login = async () => {
    errorBox.innerText = "";
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      errorBox.innerText = "Feil e-post eller passord.";
    }
  };

  /* ===== LOGOUT ===== */

  window.logout = async () => {
    await signOut(auth);
  };

  /* ===== AUTH STATE ===== */

  onAuthStateChanged(auth, async (user) => {
  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("app");
  const welcomeText = document.getElementById("welcomeText");

  if (!authBox || !appBox) {
    console.error("HTML mangler authBox eller app");
    return;
  }

  if (user) {
    currentUser = user;

    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");

    if (welcomeText) {
      welcomeText.innerText = "Innlogget som: " + user.email;
    }

    await loadStats();
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }
});

});

/* ===== LOAD STATS ===== */

async function loadStats() {
  const year = new Date().getFullYear();
  statsRef = doc(db, "stats", auth.currentUser.uid + "_" + year);

  const snap = await getDoc(statsRef);

  if (!snap.exists()) {
    const emptyStats = {
      userId: auth.currentUser.uid,
      year: year,
      total: 0,
      byBrand: {
        Burn: 0,
        Monster: 0,
        Battery: 0,
        "Red Bull": 0
      },
      monthly: {}
    };

    await setDoc(statsRef, emptyStats);
    currentStats = emptyStats;
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}

/* ===== RENDER ===== */

function renderBrands() {
  const container = document.getElementById("brands");
  container.innerHTML = "";

  brands.forEach(brand => {
    const count = currentStats.byBrand?.[brand] || 0;

    const div = document.createElement("div");
    div.className = "brand-box";
    div.innerHTML = `
      <h3>${brand}</h3>
      <p>Antall: <span id="count_${brand}">${count}</span></p>
      <button onclick="addDrink('${brand}')">+1</button>
      <button onclick="removeDrink('${brand}')">-1</button>
    `;
    container.appendChild(div);
  });
}

function updateProgress() {
  const total = currentStats.total || 0;
  const percent = Math.min((total / yearlyGoal) * 100, 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = total + " stk";
}

/* ===== ADD ===== */

window.addDrink = async (brand) => {
  const now = new Date();

  await addDoc(collection(db, "drinks"), {
    userId: auth.currentUser.uid,
    brand: brand,
    createdAt: serverTimestamp(),
    year: now.getFullYear(),
    month: now.getMonth() + 1,
    day: now.getDate()
  });

  await updateDoc(statsRef, {
    total: increment(1),
    [`byBrand.${brand}`]: increment(1),
    [`monthly.${now.getMonth() + 1}`]: increment(1)
  });

  currentStats.total++;
  currentStats.byBrand[brand]++;
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};

/* ===== REMOVE ===== */

window.removeDrink = async (brand) => {

  const q = query(
    collection(db, "drinks"),
    where("userId", "==", auth.currentUser.uid),
    where("brand", "==", brand),
    orderBy("createdAt", "desc"),
    limit(1)
  );

  const snap = await getDocs(q);
  if (snap.empty) return;

  const drinkDoc = snap.docs[0];
  const data = drinkDoc.data();

  await deleteDoc(drinkDoc.ref);

  await updateDoc(statsRef, {
    total: increment(-1),
    [`byBrand.${brand}`]: increment(-1),
    [`monthly.${data.month}`]: increment(-1)
  });

  currentStats.total--;
  currentStats.byBrand[brand]--;
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};

</script>
