<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikk Teller</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
  font-size: 32px;
  color: #00ffcc;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 25px;
  margin: 20px auto;
  max-width: 500px;
  box-shadow: 0 0 30px rgba(0,255,200,0.1);
}

.hidden { display:none; }

input {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 8px 14px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.primary { background:#00ffcc; color:black; }
.danger { background:#ff3b3b; color:white; }

.brand-title {
  font-size: 20px;
  margin-top: 15px;
  cursor:pointer;
  background: rgba(255,255,255,0.08);
  padding:10px;
  border-radius:12px;
}

.flavor-box {
  margin: 8px 0;
}

.progress-container {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  height: 25px;
  overflow: hidden;
  margin-top: 15px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00ffcc,#00cc99);
  transition: width 0.4s ease;
  font-weight:bold;
  color:black;
  line-height:25px;
}
</style>
</head>

<body>

<h1>⚡ Energidrikk Teller</h1>

<div id="authBox" class="card">
  <h2>Logg inn</h2>
  <input type="email" id="email" placeholder="E-post">
  <input type="password" id="password" placeholder="Passord (minst 6 tegn)">
  <small>Passord må være minst 6 tegn</small>
  <div id="errorMsg" style="color:#ff7070;margin-top:10px;"></div>
  <button class="primary" onclick="login()">Logg inn</button>
  <p>Har du ikke konto?</p>
  <button onclick="register()">Opprett konto</button>
</div>

<div id="app" class="hidden">
  <div class="card">
    <h2 id="welcomeText"></h2>
    <button class="danger" onclick="logout()">Logg ut</button>

    <div id="brands"></div>

    <h3>Total i år</h3>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar">0</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* LIM INN DIN FIREBASE CONFIG HER */
const firebaseConfig = {
  apiKey: "AIzaSyCUpqERB_sfUCetgxWwkynRHBUzKcVdl_8",
  authDomain: "energidrikk-teller.firebaseapp.com",
  projectId: "energidrikk-teller",
  storageBucket: "energidrikk-teller.firebasestorage.app",
  messagingSenderId: "159436464618",
  appId: "1:159436464618:web:0ffaff4f0d9e87ddc25293",
  measurementId: "G-E2M78BPZ26"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const drinks = {
  "Monster": ["Original","Ultra White","Mango Loco"],
  "Red Bull": ["Original","Sugarfree","Watermelon"],
  "Burn": ["Original","Apple Kiwi"],
  "Battery": ["Original","Blueberry","No Sugar"]
};

let statsRef;
let currentStats = { total:0, byFlavor:{} };

document.addEventListener("DOMContentLoaded", () => {

  window.register = async () => {
    if (password.value.length < 6) {
      errorMsg.innerText = "Passord må være minst 6 tegn.";
      return;
    }
    try {
      await createUserWithEmailAndPassword(auth, email.value, password.value);
    } catch {
      errorMsg.innerText = "Registrering feilet.";
    }
  };

  window.login = async () => {
    try {
      await signInWithEmailAndPassword(auth, email.value, password.value);
    } catch {
      errorMsg.innerText = "Feil e-post eller passord.";
    }
  };

  window.logout = async () => await signOut(auth);

  onAuthStateChanged(auth, async (user) => {

  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("app");
  const welcomeText = document.getElementById("welcomeText");

  if (!authBox || !appBox) {
    console.error("authBox eller app mangler i HTML");
    return;
  }

  if (user) {
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    if (welcomeText) {
      welcomeText.innerText = "Innlogget som: " + user.email;
    }
    await loadStats();
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }
});

async function loadStats(){
  const year = new Date().getFullYear();
  statsRef = doc(db,"stats",auth.currentUser.uid+"_"+year);
  const snap = await getDoc(statsRef);

  if (!snap.exists()){
    await setDoc(statsRef,currentStats);
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}

function renderBrands(){
  const brandsContainer = document.getElementById("brands");
  brandsContainer.innerHTML = "";

  Object.keys(drinks).forEach(brand=>{
    const title=document.createElement("div");
    title.className="brand-title";
    title.innerText=brand;

    const flavorContainer=document.createElement("div");
    flavorContainer.className="hidden";

    title.onclick=()=>flavorContainer.classList.toggle("hidden");

    drinks[brand].forEach(flavor=>{
      const key=brand+"_"+flavor;
      const count=currentStats.byFlavor?.[key]||0;

      const flavorDiv=document.createElement("div");
      flavorDiv.className="flavor-box";
      flavorDiv.innerHTML=`
        ${flavor}
        <button class="primary" onclick="addDrink('${key}')">+</button>
        <button class="danger" onclick="removeDrink('${key}')">-</button>
        <span id="count_${key}">${count}</span>
      `;

      flavorContainer.appendChild(flavorDiv);
    });

    brandsContainer.appendChild(title);
    brandsContainer.appendChild(flavorContainer);
  });
}

function updateProgress(){
  const percent=Math.min((currentStats.total/365)*100,100);
  const progressBar=document.getElementById("progressBar");
  progressBar.style.width=percent+"%";
  progressBar.innerText=currentStats.total+" stk";
}

window.addDrink=async(key)=>{
  await updateDoc(statsRef,{
    total:increment(1),
    [`byFlavor.${key}`]:increment(1)
  });

  currentStats.total++;
  currentStats.byFlavor[key]=(currentStats.byFlavor[key]||0)+1;

  document.getElementById("count_"+key).innerText=currentStats.byFlavor[key];
  updateProgress();
};

window.removeDrink=async(key)=>{
  if(!currentStats.byFlavor[key]) return;

  await updateDoc(statsRef,{
    total:increment(-1),
    [`byFlavor.${key}`]:increment(-1)
  });

  currentStats.total--;
  currentStats.byFlavor[key]--;

  document.getElementById("count_"+key).innerText=currentStats.byFlavor[key];
  updateProgress();
};

</script>

</body>
</html>
