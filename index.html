<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikkteller</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 { color: #00ff88; }

input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  width: 80%;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.primary { background: #00c853; color: white; }
.danger { background: #d50000; color: white; }

.brand-box {
  background: #1e1e1e;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.progress-container {
  background: #333;
  border-radius: 20px;
  margin-top: 20px;
  height: 25px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ff88, #00c853);
  line-height: 25px;
  font-weight: bold;
  color: black;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">
  <h1>Energidrikkteller</h1>

  <div id="authBox">
    <h2>Logg inn</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="password" placeholder="Passord">
    <br>
    <button class="primary" onclick="login()">Logg inn</button>
    <button onclick="register()">Registrer</button>
  </div>

  <div id="app" class="hidden">
    <h2 id="welcomeText"></h2>
    <button class="danger" onclick="logout()">Logg ut</button>

    <div id="brands"></div>

    <h3>Total i år</h3>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar">0</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc, updateDoc,
  addDoc, deleteDoc, collection, query, where,
  orderBy, limit, getDocs, serverTimestamp, increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 LIM INN DIN FIREBASE CONFIG HER */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const brands = ["Burn", "Monster", "Battery", "Red Bull"];
const yearlyGoal = 365;

let currentUser = null;
let currentStats = null;
let statsRef = null;

/* ===== AUTH ===== */

window.register = async () => {
  const email = emailInput.value;
  const password = passwordInput.value;

  const cred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", cred.user.uid), {
    email: email,
    createdAt: serverTimestamp(),
    yearlyGoal: 365
  });
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
};

window.logout = async () => {
  await signOut(auth);
};

/* ===== LOAD AFTER DOM READY ===== */

document.addEventListener("DOMContentLoaded", () => {

  window.emailInput = document.getElementById("email");
  window.passwordInput = document.getElementById("password");

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("authBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      document.getElementById("welcomeText").innerText = "Innlogget som: " + user.email;
      await loadStats();
    } else {
      document.getElementById("authBox").classList.remove("hidden");
      document.getElementById("app").classList.add("hidden");
    }
  });

});

/* ===== LOAD STATS ===== */

async function loadStats() {
  const year = new Date().getFullYear();
  statsRef = doc(db, "stats", currentUser.uid + "_" + year);

  const snap = await getDoc(statsRef);

  if (!snap.exists()) {
    const emptyStats = {
      userId: currentUser.uid,
      year: year,
      total: 0,
      byBrand: {
        Burn: 0,
        Monster: 0,
        Battery: 0,
        "Red Bull": 0
      },
      monthly: {}
    };

    await setDoc(statsRef, emptyStats);
    currentStats = emptyStats;
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}

/* ===== RENDER ===== */

function renderBrands() {
  const container = document.getElementById("brands");
  container.innerHTML = "";

  brands.forEach(brand => {
    const count = currentStats.byBrand?.[brand] || 0;

    const div = document.createElement("div");
    div.className = "brand-box";
    div.innerHTML = `
      <h3>${brand}</h3>
      <p>Antall: <span id="count_${brand}">${count}</span></p>
      <button class="primary" onclick="addDrink('${brand}')">+1</button>
      <button class="danger" onclick="removeDrink('${brand}')">-1</button>
    `;
    container.appendChild(div);
  });
}

function updateProgress() {
  const total = currentStats.total || 0;
  const percent = Math.min((total / yearlyGoal) * 100, 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = total + " stk";
}

/* ===== ADD ===== */

window.addDrink = async (brand) => {
  const now = new Date();

  await addDoc(collection(db, "drinks"), {
    userId: currentUser.uid,
    brand: brand,
    createdAt: serverTimestamp(),
    year: now.getFullYear(),
    month: now.getMonth() + 1,
    day: now.getDate()
  });

  await updateDoc(statsRef, {
    total: increment(1),
    [`byBrand.${brand}`]: increment(1),
    [`monthly.${now.getMonth() + 1}`]: increment(1)
  });

  currentStats.total++;
  currentStats.byBrand[brand]++;
  updateProgress();
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
};

/* ===== REMOVE ===== */

window.removeDrink = async (brand) => {

  const q = query(
    collection(db, "drinks"),
    where("userId", "==", currentUser.uid),
    where("brand", "==", brand),
    orderBy("createdAt", "desc"),
    limit(1)
  );

  const snap = await getDocs(q);
  if (snap.empty) return;

  const drinkDoc = snap.docs[0];
  const data = drinkDoc.data();

  await deleteDoc(drinkDoc.ref);

  await updateDoc(statsRef, {
    total: increment(-1),
    [`byBrand.${brand}`]: increment(-1),
    [`monthly.${data.month}`]: increment(-1)
  });

  currentStats.total--;
  currentStats.byBrand[brand]--;
  updateProgress();
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
};

</script>

</body>
</html>
