<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikk Teller</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 { color: #00ff88; }

.hidden { display: none; }

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 15px;
  margin: 15px auto;
  max-width: 500px;
  box-shadow: 0 0 20px rgba(0,255,136,0.1);
}

input {
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
  width: 90%;
}

button {
  padding: 6px 12px;
  margin: 4px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary { background: #00c853; color: white; }
.danger { background: #d50000; color: white; }

.brand-header {
  background: #2a2a2a;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

.flavor {
  margin: 6px 0;
}

.progress-container {
  background: #333;
  border-radius: 20px;
  margin-top: 15px;
  height: 25px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ff88, #00c853);
  line-height: 25px;
  font-weight: bold;
  color: black;
}
</style>
</head>

<body>

<h1>Energidrikk Teller</h1>

<!-- LOGIN -->
<div id="authBox" class="card">
  <h2>Logg inn</h2>
  <input type="email" id="email" placeholder="E-post">
  <input type="password" id="password" placeholder="Passord (minst 6 tegn)">
  <small style="color:#aaa;">Passord må være minst 6 tegn</small>
  <div id="errorMsg" style="color:red; margin-top:10px;"></div>
  <button class="primary" onclick="login()">Logg inn</button>
  <p>Har du ikke konto?</p>
  <button onclick="register()">Opprett konto</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="card">
    <h2 id="welcomeText"></h2>
    <button class="danger" onclick="logout()">Logg ut</button>

    <div id="brands"></div>

    <h3>Total i år</h3>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar">0</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc, updateDoc, increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 LIM INN DIN FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCUpqERB_sfUCetgxWwkynRHBUzKcVdl_8",
  authDomain: "energidrikk-teller.firebaseapp.com",
  projectId: "energidrikk-teller",
  storageBucket: "energidrikk-teller.firebasestorage.app",
  messagingSenderId: "159436464618",
  appId: "1:159436464618:web:0ffaff4f0d9e87ddc25293",
  measurementId: "G-E2M78BPZ26"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const yearlyGoal = 365;

const drinks = {
  "Monster": ["Original", "Ultra White", "Mango Loco"],
  "Red Bull": ["Original", "Sugarfree", "Watermelon"],
  "Burn": ["Original", "Apple Kiwi"],
  "Battery": ["Original", "No Sugar", "Blueberry"]
};

let currentStats;
let statsRef;

document.addEventListener("DOMContentLoaded", () => {

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const errorBox = document.getElementById("errorMsg");

  window.register = async () => {
    errorBox.innerText = "";
    if (passwordInput.value.length < 6) {
      errorBox.innerText = "Passord må være minst 6 tegn.";
      return;
    }

    try {
      await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch {
      errorBox.innerText = "Registrering feilet.";
    }
  };

  window.login = async () => {
    errorBox.innerText = "";
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch {
      errorBox.innerText = "Feil e-post eller passord.";
    }
  };

  window.logout = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    const authBox = document.getElementById("authBox");
    const appBox = document.getElementById("app");

    if (user) {
      authBox.classList.add("hidden");
      appBox.classList.remove("hidden");
      document.getElementById("welcomeText").innerText = "Innlogget som: " + user.email;
      await loadStats();
    } else {
      authBox.classList.remove("hidden");
      appBox.classList.add("hidden");
    }
  });

});

/* LOAD STATS */

async function loadStats() {
  const year = new Date().getFullYear();
  statsRef = doc(db, "stats", auth.currentUser.uid + "_" + year);

  const snap = await getDoc(statsRef);

  if (!snap.exists()) {
    currentStats = { total: 0, byFlavor: {} };
    await setDoc(statsRef, currentStats);
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}

/* RENDER */

function renderBrands() {
  const container = document.getElementById("brands");
  container.innerHTML = "";

  Object.keys(drinks).forEach(brand => {

    const brandHeader = document.createElement("div");
    brandHeader.className = "brand-header";
    brandHeader.innerText = brand;

    const flavorContainer = document.createElement("div");
    flavorContainer.className = "hidden";

    brandHeader.onclick = () => {
      flavorContainer.classList.toggle("hidden");
    };

    drinks[brand].forEach(flavor => {

      const key = brand + "_" + flavor;
      const count = currentStats.byFlavor[key] || 0;

      const flavorDiv = document.createElement("div");
      flavorDiv.className = "flavor";

      flavorDiv.innerHTML = `
        ${flavor}
        <button class="primary" onclick="addDrink('${key}')">+</button>
        <button class="danger" onclick="removeDrink('${key}')">-</button>
        <span id="count_${key}">${count}</span>
      `;

      flavorContainer.appendChild(flavorDiv);
    });

    container.appendChild(brandHeader);
    container.appendChild(flavorContainer);
  });
}

function updateProgress() {
  const total = currentStats.total || 0;
  const percent = Math.min((total / yearlyGoal) * 100, 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = total + " stk";
}

/* ADD */

window.addDrink = async (key) => {
  await updateDoc(statsRef, {
    total: increment(1),
    [`byFlavor.${key}`]: increment(1)
  });

  currentStats.total++;
  currentStats.byFlavor[key] = (currentStats.byFlavor[key] || 0) + 1;

  document.getElementById("count_" + key).innerText = currentStats.byFlavor[key];
  updateProgress();
};

/* REMOVE */

window.removeDrink = async (key) => {
  if (!currentStats.byFlavor[key] || currentStats.byFlavor[key] <= 0) return;

  await updateDoc(statsRef, {
    total: increment(-1),
    [`byFlavor.${key}`]: increment(-1)
  });

  currentStats.total--;
  currentStats.byFlavor[key]--;

  document.getElementById("count_" + key).innerText = currentStats.byFlavor[key];
  updateProgress();
};

</script>

</body>
</html>
