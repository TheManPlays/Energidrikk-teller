<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energidrikk Teller</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #111, #1c1c1c);
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #00ff88;
}

.hidden { display: none; }

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  margin: 15px auto;
  max-width: 400px;
}

input {
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
  width: 90%;
}

button {
  padding: 8px 14px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary { background: #00c853; color: white; }
.danger { background: #d50000; color: white; }

.brand {
  background: #2a2a2a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.progress-container {
  background: #333;
  border-radius: 20px;
  margin-top: 15px;
  height: 25px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ff88, #00c853);
  line-height: 25px;
  font-weight: bold;
  color: black;
}
</style>
</head>

<body>

<h1>Energidrikk Teller</h1>

<!-- LOGIN -->
<div id="authBox" class="card">
  <h2>Logg inn</h2>
  <input type="email" id="email" placeholder="E-post">
  <input type="password" id="password" placeholder="Passord (minst 6 tegn)">
  <small style="color:#aaa;">Passord må være minst 6 tegn</small>
  <div id="errorMsg" style="color:red; margin-top:10px;"></div>
  <button class="primary" onclick="login()">Logg inn</button>
  <p>Har du ikke konto?</p>
  <button onclick="register()">Opprett konto</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="card">
    <h2 id="welcomeText"></h2>
    <button class="danger" onclick="logout()">Logg ut</button>

    <div id="brands"></div>

    <h3>Total i år</h3>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar">0</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc, updateDoc,
  addDoc, deleteDoc, collection, query, where,
  orderBy, limit, getDocs, serverTimestamp, increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* LIM INN DIN FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCUpqERB_sfUCetgxWwkynRHBUzKcVdl_8",
  authDomain: "energidrikk-teller.firebaseapp.com",
  projectId: "energidrikk-teller",
  storageBucket: "energidrikk-teller.firebasestorage.app",
  messagingSenderId: "159436464618",
  appId: "1:159436464618:web:0ffaff4f0d9e87ddc25293",
  measurementId: "G-E2M78BPZ26"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const brands = ["Burn", "Monster", "Battery", "Red Bull"];
const yearlyGoal = 365;

let statsRef;
let currentStats;

document.addEventListener("DOMContentLoaded", () => {

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const errorBox = document.getElementById("errorMsg");

  window.register = async () => {
    errorBox.innerText = "";
    if (passwordInput.value.length < 6) {
      errorBox.innerText = "Passord må være minst 6 tegn.";
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);

      await setDoc(doc(db, "users", cred.user.uid), {
        email: emailInput.value,
        createdAt: serverTimestamp(),
        yearlyGoal: 365
      });

    } catch {
      errorBox.innerText = "Registrering feilet.";
    }
  };

  window.login = async () => {
    errorBox.innerText = "";
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch {
      errorBox.innerText = "Feil e-post eller passord.";
    }
  };

  window.logout = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    const authBox = document.getElementById("authBox");
    const appBox = document.getElementById("app");

    if (!authBox || !appBox) return;

    if (user) {
      authBox.classList.add("hidden");
      appBox.classList.remove("hidden");
      document.getElementById("welcomeText").innerText = "Innlogget som: " + user.email;
      await loadStats();
    } else {
      authBox.classList.remove("hidden");
      appBox.classList.add("hidden");
    }
  });

});

/* LOAD STATS */

async function loadStats() {
  const year = new Date().getFullYear();
  statsRef = doc(db, "stats", auth.currentUser.uid + "_" + year);

  const snap = await getDoc(statsRef);

  if (!snap.exists()) {
    currentStats = {
      userId: auth.currentUser.uid,
      year,
      total: 0,
      byBrand: { Burn: 0, Monster: 0, Battery: 0, "Red Bull": 0 }
    };
    await setDoc(statsRef, currentStats);
  } else {
    currentStats = snap.data();
  }

  renderBrands();
  updateProgress();
}

/* RENDER */

function renderBrands() {
  const container = document.getElementById("brands");
  container.innerHTML = "";

  brands.forEach(brand => {
    const count = currentStats.byBrand[brand] || 0;

    const div = document.createElement("div");
    div.className = "brand";
    div.innerHTML = `
      <h3>${brand}</h3>
      <p>Antall: <span id="count_${brand}">${count}</span></p>
      <button class="primary" onclick="addDrink('${brand}')">+</button>
      <button class="danger" onclick="removeDrink('${brand}')">-</button>
    `;
    container.appendChild(div);
  });
}

function updateProgress() {
  const total = currentStats.total || 0;
  const percent = Math.min((total / yearlyGoal) * 100, 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = total + " stk";
}

/* ADD */

window.addDrink = async (brand) => {
  await updateDoc(statsRef, {
    total: increment(1),
    [`byBrand.${brand}`]: increment(1)
  });

  currentStats.total++;
  currentStats.byBrand[brand]++;
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};

/* REMOVE */

window.removeDrink = async (brand) => {
  if (currentStats.byBrand[brand] <= 0) return;

  await updateDoc(statsRef, {
    total: increment(-1),
    [`byBrand.${brand}`]: increment(-1)
  });

  currentStats.total--;
  currentStats.byBrand[brand]--;
  document.getElementById("count_" + brand).innerText = currentStats.byBrand[brand];
  updateProgress();
};
</script>

</body>
</html>
